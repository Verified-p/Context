<nav aria-label="breadcrumb" class="modern-breadcrumb-nav" style="
    display: block;
    width: 100%;
    margin-bottom: 1.5rem;
    font-family: 'Inter', sans-serif;
">
    <ol class="breadcrumb" style="
        display: flex;
        align-items: center;
        flex-wrap: nowrap; /* Prevents ugly line-breaks on small screens */
        overflow-x: auto; /* Enables smooth horizontal swiping on mobile */
        -webkit-overflow-scrolling: touch;
        padding: 0.65rem 1.25rem;
        margin-bottom: 0;
        list-style: none;
        background: rgba(248, 250, 252, 0.8);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid #e2e8f0;
        border-radius: 10px;
    ">
        
        <li class="breadcrumb-item" style="
            display: flex;
            align-items: center;
            white-space: nowrap;
            font-size: 0.9rem;
        ">
            <a href="#" style="
                color: #4f46e5;
                font-weight: 500;
                text-decoration: none !important;
                display: flex;
                align-items: center;
                gap: 0.35rem;
                transition: color 0.2s ease-in-out;
                outline: none;
            " onmouseover="this.style.color='#3730a3'" onmouseout="this.style.color='#4f46e5'">
                <i class="fa-solid fa-house" style="font-size: 0.82rem; opacity: 0.85;"></i>
                <span>Home</span>
            </a>
        </li>

        <li style="
            display: flex;
            align-items: center;
            padding: 0 0.65rem;
            color: #94a3b8;
            font-size: 0.75rem;
            user-select: none;
        ">
            <i class="fa-solid fa-chevron-right"></i>
        </li>

        <li class="breadcrumb-item active" aria-current="page" style="
            display: flex;
            align-items: center;
            white-space: nowrap;
            color: #64748b;
            font-weight: 500;
            font-size: 0.9rem;
        ">
            <span>Dashboard</span>
        </li>

    </ol>
</nav>

<style>
    /* Hides the scrollbar on mobile layout tracks while retaining native swipe capability */
    .modern-breadcrumb-nav ol::-webkit-scrollbar {
        display: none;
    }
    .modern-breadcrumb-nav ol {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const breadcrumbList = document.querySelector('.modern-breadcrumb-nav ol');
        if (breadcrumbList) {
            // Automatically push the container focus to the right end if the active trail overflows on mobile
            breadcrumbList.scrollLeft = breadcrumbList.scrollWidth;
        }
    });
</script>
