{% extends 'base.html' %}

{% block content %}

<div class="container">

    <h2>Assignments (Trainer View)</h2>

    <table class="table">

        <tr>
            <th>Code</th>
            <th>Title</th>
            <th>Status</th>
        </tr>

        {% for a in assignments %}
        <tr>
            <td>{{ a.assignment_code }}</td>
            <td>{{ a.title }}</td>
            <td>{{ a.status }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
