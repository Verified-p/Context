{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h3>Change Password</h3>

    <div class="card p-4 shadow-sm">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-2">
                <label>Old Password</label>
                {{ form.old_password }}
            </div>

            <div class="mb-2">
                <label>New Password</label>
                {{ form.new_password1 }}
            </div>

            <div class="mb-2">
                <label>Confirm Password</label>
                {{ form.new_password2 }}
            </div>

            <button class="btn btn-danger w-100 mt-2">
                Update Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
